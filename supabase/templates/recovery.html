<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GafCore — nueva contraseña</title>
  </head>
  <body style="margin:0;font-family:system-ui,-apple-system,sans-serif;background:#0f1117;color:#e5e7eb;line-height:1.5;padding:24px;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:480px;margin:0 auto;">
      <tr>
        <td style="padding:20px 0 8px;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:#a78bfa;">
          GafCore
        </td>
      </tr>
      <tr>
        <td style="padding:0 0 12px;font-size:20px;font-weight:700;color:#f9fafb;">
          Restablecer contraseña
        </td>
      </tr>
      <tr>
        <td style="padding:0 0 20px;font-size:15px;color:#cbd5e1;">
          Recibimos una solicitud para crear una contraseña nueva en GafCore para
          <strong style="color:#f9fafb;">{{ .Email }}</strong>. Si fuiste tú, usa el botón de abajo.
        </td>
      </tr>
      <tr>
        <td style="padding:0 0 24px;">
          <a
            href="{{ .ConfirmationURL }}"
            style="display:inline-block;padding:12px 20px;border-radius:10px;background:#7c3aed;color:#fff;font-weight:600;text-decoration:none;font-size:15px;"
          >
            Crear nueva contraseña
          </a>
        </td>
      </tr>
      <tr>
        <td style="padding:0;font-size:13px;color:#94a3b8;">
          Si no pediste este correo, puedes ignorarlo. El enlace caduca por seguridad.
        </td>
      </tr>
    </table>
  </body>
</html>
