# Despliegue a Vercel Production (requiere secrets en el repo).
# Ver docs/DEPLOY_GITHUB_ACTIONS.md
name: Deploy Vercel Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build (Vercel preset → .vercel/output)
        run: npm run build
        env:
          VERCEL: "1"

      - name: Deploy prebuilt to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: "--prebuilt --prod"
