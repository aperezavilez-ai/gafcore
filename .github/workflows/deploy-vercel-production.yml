# Despliegue a Vercel Production (requiere secrets en el repo).
# Ver docs/DEPLOY_GITHUB_ACTIONS.md
name: Deploy Vercel Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build (Vercel preset → .vercel/output)
        run: npm run build
        env:
          VERCEL: "1"

      - name: Install Vercel CLI v47+
        run: npm install -g vercel@47

      - name: Deploy prebuilt to Vercel Production
        run: vercel deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
